<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asanas Gallery - Yoga 3D</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      body {
        font-family: "Manrope", sans-serif;
      }
      .container {
        max-width: 1240px;
        margin: 118px auto 42px;
        padding: 36px;
        background: rgba(255, 252, 246, 0.66);
        border-radius: 36px;
        box-shadow: 0 28px 60px rgba(48, 55, 44, 0.12);
        backdrop-filter: blur(14px);
      }
      h1 {
        text-align: center;
        margin-bottom: 14px;
        color: #243126;
        font-size: clamp(2.8rem, 5vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: -0.03em;
      }
      .filters {
        text-align: center;
        margin-bottom: 34px;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      .filters button {
        padding: 0 20px;
        min-height: 46px;
        border: 1px solid rgba(93, 124, 100, 0.14);
        border-radius: 999px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.78);
        color: #314133;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        box-shadow: 0 12px 20px rgba(44, 51, 42, 0.06);
      }
      .filters button:hover {
        background: rgba(93, 124, 100, 0.12);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 22px;
      }
      .card h3 {
        margin: 14px 0 10px 0;
        color: #243126;
        font-size: 30px;
        font-family: "Cormorant Garamond", serif;
      }
      .card p {
        color: #667162;
        line-height: 1.75;
        margin: 10px 0 0;
      }
      .card em {
        color: #8a6d53;
        font-style: normal;
        font-weight: 700;
      }
      @media (max-width: 768px) {
        .container {
          margin: 104px 14px 22px;
          padding: 22px;
          border-radius: 26px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="/">🧘 3D Viewer</a></li>
        <li><a href="/asanas.html">📚 Gallery</a></li>
        <li><a href="/dashboard.html">📊 Dashboard</a></li>
        <li><a href="/about.html">ℹ️ About</a></li>
        <li id="auth-link"><a href="/login.html">🔐 Login</a></li>
      </ul>
    </nav>

    <div class="container">
      <h1>Yoga Asanas Gallery</h1>
      <div class="filters">
        <button onclick="filterPoses('all')">All</button>
        <button onclick="filterPoses('Beginner')">Beginner</button>
        <button onclick="filterPoses('Intermediate')">Intermediate</button>
        <button onclick="filterPoses('Advanced')">Advanced</button>
      </div>
      <div class="grid" id="gallery"></div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
      let allPoses = [];

      async function loadGallery() {
        const res = await fetch("/api/asanas");
        const data = await res.json();
        allPoses = data.data;
        displayPoses(allPoses);

        // Update auth link
        const authLink = document.getElementById("auth-link");
        if (window.yogaAPI && yogaAPI.isAuthenticated()) {
          authLink.innerHTML = `<a href="/dashboard.html">👤 ${yogaAPI.user.name}</a>`;
        }
      }

      function displayPoses(poses) {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = poses
          .map(
            (asana) => `
                <div class="card">
                    <span class="badge ${asana.difficulty.toLowerCase()}">${asana.difficulty}</span>
                    <h3>${asana.name}</h3>
                    <p><em>${asana.sanskritName}</em></p>
                    <p>${asana.description}</p>
                    <p><strong>Benefits:</strong> ${asana.benefits.join(", ")}</p>
                </div>
            `,
          )
          .join("");
      }

      function filterPoses(difficulty) {
        if (difficulty === "all") {
          displayPoses(allPoses);
        } else {
          const filtered = allPoses.filter((p) => p.difficulty === difficulty);
          displayPoses(filtered);
        }
      }

      loadGallery();
    </script>
  </body>
</html>
