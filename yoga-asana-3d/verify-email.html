<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email - Yoga 3D</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      body {
        font-family: "Manrope", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .auth-container {
        background: rgba(255, 251, 245, 0.78);
        border-radius: 34px;
        padding: 42px;
        box-shadow: 0 28px 60px rgba(46, 52, 43, 0.14);
        max-width: 470px;
        width: 90%;
        backdrop-filter: blur(16px);
      }
      .auth-container h1 {
        text-align: center;
        margin: 0 0 10px 0;
        color: #243126;
        font-size: clamp(2.8rem, 5vw, 4rem);
        line-height: 0.94;
      }
      .auth-container p {
        text-align: center;
        color: #677262;
        margin-bottom: 24px;
        line-height: 1.7;
      }
      .btn {
        width: 100%;
        min-height: 56px;
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <a href="/" class="back-home">Back to Home</a>

    <div class="auth-container">
      <h1>Verify Your Email</h1>
      <p id="instructions">
        Enter the 6-digit OTP sent to your email to activate your Yoga 3D account.
      </p>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <form id="verify-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="otp">OTP</label>
          <input
            type="text"
            id="otp"
            name="otp"
            required
            minlength="6"
            maxlength="6"
            inputmode="numeric"
            placeholder="123456"
          />
        </div>

        <button type="submit" class="btn" id="submit-btn">Verify Email</button>
      </form>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const emailFromQuery = params.get("email");
      const form = document.getElementById("verify-form");
      const emailInput = document.getElementById("email");
      const otpInput = document.getElementById("otp");
      const errorDiv = document.getElementById("error");
      const successDiv = document.getElementById("success");
      const submitBtn = document.getElementById("submit-btn");

      if (emailFromQuery) {
        emailInput.value = emailFromQuery;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        errorDiv.style.display = "none";
        successDiv.style.display = "none";
        submitBtn.disabled = true;
        submitBtn.textContent = "Verifying...";

        try {
          await yogaAPI.verifyEmailOtp({
            email: emailInput.value,
            otp: otpInput.value.trim(),
          });

          successDiv.textContent = "Email verified successfully! Redirecting...";
          successDiv.style.display = "block";

          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 1000);
        } catch (error) {
          errorDiv.textContent =
            error.message || "Verification failed. Please try again.";
          errorDiv.style.display = "block";
          submitBtn.disabled = false;
          submitBtn.textContent = "Verify Email";
        }
      });

      if (yogaAPI.isAuthenticated()) {
        window.location.href = "/dashboard.html";
      }
    </script>
  </body>
</html>
