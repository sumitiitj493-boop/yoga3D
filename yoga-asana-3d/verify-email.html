<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email - Yoga 3D</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .auth-container {
        background: white;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 420px;
        width: 90%;
      }
      .auth-container h1 {
        text-align: center;
        margin: 0 0 10px 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .auth-container p {
        text-align: center;
        color: #666;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
      }
      .form-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #eee;
        border-radius: 8px;
        font-size: 16px;
      }
      .form-group input:focus {
        outline: none;
        border-color: #667eea;
      }
      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .error {
        background: #fee;
        color: #c33;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .success {
        background: #efe;
        color: #3c3;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .back-home {
        position: fixed;
        top: 20px;
        left: 20px;
        color: white;
        text-decoration: none;
        font-size: 18px;
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        backdrop-filter: blur(10px);
      }
    </style>
  </head>
  <body>
    <a href="/" class="back-home">Back to Home</a>

    <div class="auth-container">
      <h1>Verify Your Email</h1>
      <p id="instructions">
        Enter the 6-digit OTP sent to your email to activate your Yoga 3D account.
      </p>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <form id="verify-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="otp">OTP</label>
          <input
            type="text"
            id="otp"
            name="otp"
            required
            minlength="6"
            maxlength="6"
            inputmode="numeric"
            placeholder="123456"
          />
        </div>

        <button type="submit" class="btn" id="submit-btn">Verify Email</button>
      </form>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const emailFromQuery = params.get("email");
      const form = document.getElementById("verify-form");
      const emailInput = document.getElementById("email");
      const otpInput = document.getElementById("otp");
      const errorDiv = document.getElementById("error");
      const successDiv = document.getElementById("success");
      const submitBtn = document.getElementById("submit-btn");

      if (emailFromQuery) {
        emailInput.value = emailFromQuery;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        errorDiv.style.display = "none";
        successDiv.style.display = "none";
        submitBtn.disabled = true;
        submitBtn.textContent = "Verifying...";

        try {
          await yogaAPI.verifyEmailOtp({
            email: emailInput.value,
            otp: otpInput.value.trim(),
          });

          successDiv.textContent = "Email verified successfully! Redirecting...";
          successDiv.style.display = "block";

          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 1000);
        } catch (error) {
          errorDiv.textContent =
            error.message || "Verification failed. Please try again.";
          errorDiv.style.display = "block";
          submitBtn.disabled = false;
          submitBtn.textContent = "Verify Email";
        }
      });

      if (yogaAPI.isAuthenticated()) {
        window.location.href = "/dashboard.html";
      }
    </script>
  </body>
</html>
