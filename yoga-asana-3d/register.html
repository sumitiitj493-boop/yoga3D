<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Yoga 3D</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
      }
      .auth-container {
        background: white;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 90%;
        margin: 80px auto;
      }
      .auth-container h1 {
        text-align: center;
        margin: 0 0 10px 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .auth-container p {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 12px;
        border: 2px solid #eee;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.3s;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #667eea;
      }
      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        transition: all 0.3s;
      }
      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .error {
        background: #fee;
        color: #c33;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .success {
        background: #efe;
        color: #3c3;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .switch-auth {
        text-align: center;
        margin-top: 20px;
        color: #666;
      }
      .switch-auth a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }
      .switch-auth a:hover {
        text-decoration: underline;
      }
      .back-home {
        position: fixed;
        top: 20px;
        left: 20px;
        color: white;
        text-decoration: none;
        font-size: 18px;
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        backdrop-filter: blur(10px);
      }
      .back-home:hover {
        background: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <a href="/" class="back-home">← Back to Home</a>

    <div class="auth-container">
      <h1>🧘 Join Yoga 3D</h1>
      <p>Start your yoga journey today</p>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="John Doe"
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="your@email.com"
          />
        </div>

        <div class="form-group">
          <label for="password">Password (min 6 characters)</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="6"
            placeholder="••••••••"
          />
        </div>

        <div class="form-group">
          <label for="level">Experience Level</label>
          <select id="level" name="level" required>
            <option value="Beginner">🌱 Beginner</option>
            <option value="Intermediate">💪 Intermediate</option>
            <option value="Advanced">🏆 Advanced</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          Create Account
        </button>
      </form>

      <div class="switch-auth">
        Already have an account? <a href="/login.html">Login here</a>
      </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
      const form = document.getElementById("register-form");
      const errorDiv = document.getElementById("error");
      const successDiv = document.getElementById("success");
      const submitBtn = document.getElementById("submit-btn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        errorDiv.style.display = "none";
        successDiv.style.display = "none";
        submitBtn.disabled = true;
        submitBtn.textContent = "Creating account...";

        const userData = {
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
          level: document.getElementById("level").value,
        };

        try {
          const response = await yogaAPI.register(userData);
          successDiv.textContent =
            response.message || "Verification OTP sent. Redirecting...";
          successDiv.style.display = "block";

          setTimeout(() => {
            window.location.href = `/verify-email.html?email=${encodeURIComponent(userData.email)}`;
          }, 1500);
        } catch (error) {
          errorDiv.textContent =
            error.message || "Registration failed. Please try again.";
          errorDiv.style.display = "block";
          submitBtn.disabled = false;
          submitBtn.textContent = "Create Account";
        }
      });

      // Redirect if already logged in
      if (yogaAPI.isAuthenticated()) {
        window.location.href = "/dashboard.html";
      }
    </script>
  </body>
</html>
