<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Yoga 3D Viewer</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Manrope", sans-serif;
        overflow: hidden;
      }
      nav {
        position: fixed;
        z-index: 300;
      }
      #ui {
        position: absolute;
        top: 110px;
        left: 28px;
        color: #f4f1ea;
        background: linear-gradient(180deg, rgba(26, 34, 29, 0.9), rgba(28, 34, 31, 0.76));
        padding: 28px;
        border-radius: 30px;
        width: min(380px, calc(100vw - 40px));
        box-shadow: 0 24px 60px rgba(12, 16, 14, 0.35);
        border: 1px solid rgba(234, 226, 214, 0.12);
        backdrop-filter: blur(18px);
        z-index: 200;
      }
      h2 {
        margin: 0 0 15px 0;
        font-size: 42px;
        line-height: 0.95;
        color: #f6efe3;
        font-family: "Cormorant Garamond", serif;
      }
      select {
        width: 100%;
        padding: 14px 16px;
        margin-bottom: 16px;
        font-size: 15px;
        border-radius: 18px;
        border: 1px solid rgba(240, 234, 225, 0.14);
        cursor: pointer;
        background: rgba(255, 250, 242, 0.08);
        color: #f7f1e7;
        color-scheme: dark;
      }
      select option {
        background: #f8f4ec;
        color: #243126;
      }
      select:focus option:checked {
        background: #5d7c64;
        color: #f8f4ec;
      }
      h3 {
        margin: 18px 0 10px 0;
        font-size: 28px;
        color: #f8f2e8;
        font-family: "Cormorant Garamond", serif;
      }
      p {
        line-height: 1.75;
        font-size: 14px;
        color: rgba(247, 241, 231, 0.78);
      }
      .badge {
        display: inline-flex;
        padding: 0 14px;
        border-radius: 999px;
        font-size: 11px;
        margin-top: 12px;
        font-weight: 800;
        min-height: 32px;
      }
      .benefits {
        margin-top: 14px;
        font-size: 13px;
        padding-left: 18px;
        color: rgba(247, 241, 231, 0.88);
      }
      .benefits li {
        margin: 8px 0;
      }
      #sketchfab-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        z-index: 1;
      }
      #sketchfab-container iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      #sketchfab-container img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border: none;
        background: #111827;
      }
      #threejs-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      #ui::after {
        content: "";
        position: absolute;
        inset: auto -40px -40px auto;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(193, 148, 100, 0.28), transparent 70%);
        pointer-events: none;
      }
      #practice-controls > div {
        background: rgba(250, 244, 234, 0.08) !important;
        padding: 18px !important;
        border-radius: 22px !important;
        border: 1px solid rgba(244, 236, 226, 0.1);
      }
      #practice-controls h4 {
        margin: 0 0 12px 0;
        color: #f8f2e8 !important;
        font-family: "Cormorant Garamond", serif;
        font-size: 24px;
      }
      #timer-display {
        font-family: "Cormorant Garamond", serif;
        font-size: 52px !important;
        color: #f1c290 !important;
      }
      #favorite-btn,
      #timer-btn,
      #save-session-btn {
        border-radius: 16px !important;
        min-height: 48px;
        font-weight: 800 !important;
        letter-spacing: 0.02em;
        box-shadow: 0 14px 26px rgba(17, 20, 17, 0.18);
      }
      #favorite-btn {
        background: linear-gradient(135deg, #c98a5f, #ab6844) !important;
      }
      #timer-btn {
        background: linear-gradient(135deg, #6d8f74, #4b6954) !important;
      }
      #save-session-btn {
        background: linear-gradient(135deg, #ece2d0, #d8c4a8) !important;
        color: #2d382f !important;
      }
      @media (max-width: 900px) {
        #ui {
          top: auto;
          bottom: 18px;
          left: 18px;
          right: 18px;
          width: auto;
          padding: 22px;
          border-radius: 24px;
        }
        h2 {
          font-size: 34px;
        }
        h3 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Container for Sketchfab embeds -->
    <div id="sketchfab-container"></div>

    <!-- Container for Three.js viewer -->
    <div id="threejs-container"></div>

    <nav>
      <ul>
        <li><a href="/">🧘 3D Viewer</a></li>
        <li><a href="/asanas.html">📚 Gallery</a></li>
        <li><a href="/dashboard.html">📊 Dashboard</a></li>
        <li><a href="/about.html">ℹ️ About</a></li>
        <li id="auth-link"><a href="/login.html">🔐 Login</a></li>
      </ul>
    </nav>

    <div id="ui">
      <h2>🧘 Yoga 3D Viewer</h2>
      <select id="asana-select">
        <option>Loading poses...</option>
      </select>
      <h3 id="pose-name">Select a Pose</h3>
      <p id="pose-desc">Choose a yoga pose to view its 3D representation.</p>
      <span id="difficulty-badge" class="badge" style="display: none"
        >Beginner</span
      >
      <ul class="benefits" id="benefits-list"></ul>

      <!-- Practice Controls -->
      <div id="practice-controls" style="margin-top: 15px; display: none">
        <button
          id="favorite-btn"
          onclick="toggleFavorite()"
          style="
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #ff9800;
            color: white;
            font-size: 14px;
            font-weight: bold;
          "
        >
          ❤️ Add to Favorites
        </button>
        <div
          style="
            background: rgba(102, 126, 234, 0.1);
            padding: 15px;
            border-radius: 8px;
          "
        >
          <h4 style="margin: 0 0 10px 0; color: #667eea">⏱️ Practice Timer</h4>
          <div
            id="timer-display"
            style="
              font-size: 32px;
              text-align: center;
              color: #667eea;
              margin: 10px 0;
            "
          >
            00:00
          </div>
          <button
            id="timer-btn"
            onclick="toggleTimer()"
            style="
              width: 100%;
              padding: 10px;
              margin-bottom: 10px;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              background: #4caf50;
              color: white;
              font-size: 14px;
              font-weight: bold;
            "
          >
            ▶️ Start Practice
          </button>
          <button
            id="save-session-btn"
            onclick="savePracticeSession()"
            style="
              width: 100%;
              padding: 10px;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              background: #667eea;
              color: white;
              font-size: 14px;
              font-weight: bold;
              display: none;
            "
          >
            💾 Save Session
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/3d-viewer.js"></script>

    <script>
      // Global variables
      let currentAsana = null;
      let timerInterval = null;
      let timerSeconds = 0;
      let isTimerRunning = false;

      // Initialize the 3D viewer
      const viewer = new YogaPoseViewer("threejs-container", {
        backgroundColor: 0x1a1a2e,
        enableShadows: true,
        enableGrid: true,
        cameraPosition: { x: 3, y: 3, z: 8 },
      });

      // Start the animation loop
      viewer.animate();

      // Function to update pose - handles Sketchfab, GIF, GLB, or procedural
      async function setPose(poseName, difficulty, modelUrl, modelType) {
        const sketchfabContainer = document.getElementById(
          "sketchfab-container",
        );
        const threejsContainer = document.getElementById("threejs-container");

        // Check if it's a Sketchfab model
        if (modelType === "sketchfab" && modelUrl) {
          console.log(`✅ Loading Sketchfab model for ${poseName}`);

          // Hide Three.js viewer, show Sketchfab
          threejsContainer.style.display = "none";
          sketchfabContainer.style.display = "block";

          // Create iframe with Sketchfab embed
          sketchfabContainer.innerHTML = `
            <iframe 
              title="${poseName}" 
              frameborder="0" 
              allowfullscreen 
              mozallowfullscreen="true" 
              webkitallowfullscreen="true" 
              allow="autoplay; fullscreen; xr-spatial-tracking" 
              xr-spatial-tracking 
              execution-while-out-of-viewport 
              execution-while-not-rendered 
              web-share 
              src="${modelUrl}?autostart=1&ui_theme=dark">
            </iframe>
          `;
          return;
        }

        if (modelType === "gif" && modelUrl) {
          console.log(`✅ Loading GIF preview for ${poseName}`);

          threejsContainer.style.display = "none";
          sketchfabContainer.style.display = "block";
          sketchfabContainer.innerHTML = `
            <img
              src="${modelUrl}"
              alt="${poseName} animated preview"
            />
          `;
          return;
        }

        // Show Three.js viewer, hide Sketchfab
        sketchfabContainer.style.display = "none";
        threejsContainer.style.display = "block";

        // Try to load GLB model first
        if (modelType === "glb" && modelUrl) {
          try {
            console.log(`Attempting to load GLB model: ${modelUrl}`);
            await viewer.loadModel(modelUrl, (progress) => {
              console.log(
                `Loading ${poseName}: ${Math.round(progress * 100)}%`,
              );
            });
            console.log(`✅ Successfully loaded 3D model for ${poseName}`);
            return;
          } catch (error) {
            console.warn(
              `⚠️ Could not load GLB model for ${poseName}, using procedural pose instead`,
            );
            console.warn(`Model URL: ${modelUrl}`);
            console.warn(`Error: ${error.message}`);
          }
        }

        // Fallback to procedural pose
        console.log(`Using procedural pose for ${poseName}`);
        viewer.loadPose(poseName, difficulty);
      }

      // Load asanas from API
      async function loadAsanas() {
        try {
          const response = await fetch("/api/asanas");
          const data = await response.json();

          const select = document.getElementById("asana-select");
          select.innerHTML =
            '<option value="">-- Choose a Yoga Pose --</option>';

          data.data.forEach((asana) => {
            const option = document.createElement("option");
            option.value = JSON.stringify(asana);
            option.text = `${asana.name} (${asana.sanskritName})`;
            select.appendChild(option);
          });

          select.addEventListener("change", (e) => {
            if (e.target.value) {
              const asana = JSON.parse(e.target.value);
              updatePose(asana);
            }
          });

          // Update auth link
          updateAuthLink();
        } catch (error) {
          console.error("Error loading asanas:", error);
          document.getElementById("asana-select").innerHTML =
            "<option>Error: Check backend</option>";
        }
      }

      function updatePose(asana) {
        currentAsana = asana;
        document.getElementById("pose-name").innerText = asana.name;
        document.getElementById("pose-desc").innerText = asana.description;

        const badge = document.getElementById("difficulty-badge");
        badge.innerText = asana.difficulty;
        badge.className = "badge " + asana.difficulty.toLowerCase();
        badge.style.display = "inline-block";

        // Update benefits list
        const benefitsList = document.getElementById("benefits-list");
        benefitsList.innerHTML = asana.benefits
          .map((b) => `<li>✓ ${b}</li>`)
          .join("");

        // Change pose - try to load 3D model or use procedural
        setPose(asana.name, asana.difficulty, asana.modelUrl, asana.modelType);

        // Show practice controls if logged in
        if (yogaAPI.isAuthenticated()) {
          document.getElementById("practice-controls").style.display = "block";
          updateFavoriteButton();
        }

        // Reset timer
        resetTimer();
      }

      // Timer functions
      function toggleTimer() {
        if (isTimerRunning) {
          stopTimer();
        } else {
          startTimer();
        }
      }

      function startTimer() {
        isTimerRunning = true;
        const timerBtn = document.getElementById("timer-btn");
        timerBtn.textContent = "⏸️ Pause Practice";
        timerBtn.style.background = "#FF9800";

        timerInterval = setInterval(() => {
          timerSeconds++;
          updateTimerDisplay();
        }, 1000);
      }

      function stopTimer() {
        isTimerRunning = false;
        clearInterval(timerInterval);
        const timerBtn = document.getElementById("timer-btn");
        timerBtn.textContent = "▶️ Resume Practice";
        timerBtn.style.background = "#4CAF50";

        if (timerSeconds > 0) {
          document.getElementById("save-session-btn").style.display = "block";
        }
      }

      function resetTimer() {
        isTimerRunning = false;
        timerSeconds = 0;
        clearInterval(timerInterval);
        updateTimerDisplay();
        const timerBtn = document.getElementById("timer-btn");
        timerBtn.textContent = "▶️ Start Practice";
        timerBtn.style.background = "#4CAF50";
        document.getElementById("save-session-btn").style.display = "none";
      }

      function updateTimerDisplay() {
        const minutes = Math.floor(timerSeconds / 60);
        const seconds = timerSeconds % 60;
        document.getElementById("timer-display").textContent =
          `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(
            2,
            "0",
          )}`;
      }

      async function savePracticeSession() {
        if (!yogaAPI.isAuthenticated()) {
          alert("Please login to save your practice session");
          return;
        }

        if (!currentAsana || timerSeconds === 0) {
          alert("Start practicing a pose first!");
          return;
        }

        try {
          const response = await yogaAPI.recordPractice(currentAsana._id, {
            duration: timerSeconds,
            feedback: "Practice session completed",
          });

          alert(
            `✅ Session saved! ${Math.round(timerSeconds / 60)} minutes practiced.\nStreak: ${
              response.userStats.streak
            } days\nTotal practice time: ${
              response.userStats.totalPracticeTime
            } minutes`,
          );
          resetTimer();
        } catch (error) {
          console.error("Error saving session:", error);
          alert("Failed to save session. Please try again.");
        }
      }

      async function toggleFavorite() {
        if (!yogaAPI.isAuthenticated()) {
          alert("Please login to add favorites");
          window.location.href = "/login.html";
          return;
        }

        if (!currentAsana) return;

        try {
          await yogaAPI.toggleFavorite(currentAsana._id);
          updateFavoriteButton();
        } catch (error) {
          console.error("Error toggling favorite:", error);
          alert("Failed to update favorite. Please try again.");
        }
      }

      function updateFavoriteButton() {
        if (!yogaAPI.user || !currentAsana) return;

        const btn = document.getElementById("favorite-btn");
        const isFavorite =
          yogaAPI.user.favoritePoses &&
          yogaAPI.user.favoritePoses.some(
            (p) => p._id === currentAsana._id || p === currentAsana._id,
          );

        if (isFavorite) {
          btn.textContent = "💔 Remove from Favorites";
          btn.style.background = "#F44336";
        } else {
          btn.textContent = "❤️ Add to Favorites";
          btn.style.background = "#FF9800";
        }
      }

      function updateAuthLink() {
        const authLink = document.getElementById("auth-link");
        if (yogaAPI.isAuthenticated()) {
          authLink.innerHTML = `<a href="/dashboard.html">👤 ${yogaAPI.user.name}</a>`;
        } else {
          authLink.innerHTML = '<a href="/login.html">🔐 Login</a>';
        }
      }

      window.addEventListener("resize", () => {
        viewer.camera.aspect = window.innerWidth / window.innerHeight;
        viewer.camera.updateProjectionMatrix();
        viewer.renderer.setSize(window.innerWidth, window.innerHeight);
      });

      loadAsanas();
    </script>
  </body>
</html>
