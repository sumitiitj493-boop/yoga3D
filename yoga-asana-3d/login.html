<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Yoga 3D</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      body {
        font-family: "Manrope", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .auth-container {
        background: rgba(255, 251, 245, 0.78);
        border-radius: 34px;
        padding: 42px;
        box-shadow: 0 28px 60px rgba(46, 52, 43, 0.14);
        max-width: 460px;
        width: 90%;
        backdrop-filter: blur(16px);
      }
      .auth-container h1 {
        text-align: center;
        margin: 0 0 10px 0;
        color: #243126;
        font-size: clamp(2.8rem, 5vw, 4rem);
        line-height: 0.94;
      }
      .auth-container p {
        text-align: center;
        color: #677262;
        margin-bottom: 30px;
        line-height: 1.7;
      }
      .btn {
        width: 100%;
        min-height: 56px;
      }
      .switch-auth {
        text-align: center;
        margin-top: 24px;
        color: #677262;
      }
      .switch-auth a {
        color: #4f6b56;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <a href="/" class="back-home">← Back to Home</a>

    <div class="auth-container">
      <h1>🧘 Login to Yoga 3D</h1>
      <p>Track your progress and master yoga poses</p>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="your@email.com"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="••••••••"
          />
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          Login
        </button>
      </form>

      <div class="switch-auth">
        Don't have an account? <a href="/register.html">Register here</a>
      </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
      const form = document.getElementById("login-form");
      const errorDiv = document.getElementById("error");
      const successDiv = document.getElementById("success");
      const submitBtn = document.getElementById("submit-btn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        errorDiv.style.display = "none";
        successDiv.style.display = "none";
        submitBtn.disabled = true;
        submitBtn.textContent = "Logging in...";

        const credentials = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        };

        try {
          await yogaAPI.login(credentials);
          successDiv.textContent = "Login successful! Redirecting...";
          successDiv.style.display = "block";

          setTimeout(() => {
            window.location.href = "/dashboard.html";
          }, 1000);
        } catch (error) {
          if (error.message && error.message.includes("verify your email")) {
            errorDiv.innerHTML = `Please verify your email before logging in. <a href="/verify-email.html?email=${encodeURIComponent(credentials.email)}">Verify now</a>`;
          } else {
            errorDiv.textContent =
              error.message || "Login failed. Please try again.";
          }
          errorDiv.style.display = "block";
          submitBtn.disabled = false;
          submitBtn.textContent = "Login";
        }
      });

      // Redirect if already logged in
      if (yogaAPI.isAuthenticated()) {
        window.location.href = "/dashboard.html";
      }
    </script>
  </body>
</html>
